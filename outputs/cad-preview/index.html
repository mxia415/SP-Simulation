<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WQ3D-DB001 CAD 尺寸预览</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="panel">
        <header>
          <p class="eyebrow">DWG MEASURE REVIEW</p>
          <h1>三节臂折叠尺寸</h1>
          <div class="file-line">WQ3D-DB001-260307 · mm</div>
        </header>

        <section class="summary">
          <div><span>曲线</span><strong id="curveCount">-</strong></div>
          <div><span>尺寸</span><strong id="dimensionCount">-</strong></div>
          <div><span>单位</span><strong>mm</strong></div>
        </section>

        <section class="tools">
          <button id="fitButton" type="button">适配视图</button>
          <label>
            <input id="labelToggle" type="checkbox" checked />
            显示尺寸
          </label>
        </section>

        <section>
          <div class="section-title">大尺寸候选</div>
          <div id="majorList" class="dimension-list"></div>
        </section>

        <section>
          <div class="section-title">全部尺寸</div>
          <div id="dimensionList" class="dimension-list compact"></div>
        </section>
      </aside>

      <section class="viewer">
        <canvas id="cadCanvas"></canvas>
        <div class="hud top-left">
          <span>选中尺寸</span>
          <strong id="selectedReadout">未选择</strong>
        </div>
        <div class="hud bottom-left">
          <span>视图</span>
          <strong>滚轮缩放 · 拖拽平移</strong>
        </div>
      </section>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
