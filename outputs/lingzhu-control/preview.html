<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP-S Arctic Preview</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --panel: rgba(255, 255, 255, 0.86);
        --line: rgba(122, 132, 145, 0.3);
        --text: #222832;
        --muted: #66717f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef1f4;
        color: var(--text);
      }

      #viewport {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .panel {
        position: fixed;
        top: 18px;
        left: 18px;
        width: min(330px, calc(100vw - 36px));
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(14px);
      }

      .panel h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 720;
        letter-spacing: 0;
      }

      .panel p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .control {
        display: grid;
        gap: 6px;
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .control strong {
        color: var(--text);
        font-weight: 650;
      }

      .control input {
        width: 100%;
        accent-color: #5c6b7a;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status {
        position: fixed;
        right: 18px;
        bottom: 18px;
        max-width: min(420px, calc(100vw - 36px));
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        backdrop-filter: blur(14px);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="viewport"></canvas>
    <section class="panel" aria-label="Arctic preview controls">
      <h1>SP-S Arctic Preview</h1>
      <p>独立预览页：白色实体、浅背景、柔和阴影和环境光遮蔽。不会加载主控制页脚本。</p>
      <label class="control">
        <span class="row"><span>AO 强度</span><strong id="aoValue">1.6</strong></span>
        <input id="aoStrength" type="range" min="0" max="3" value="1.6" step="0.1" />
      </label>
      <label class="control">
        <span class="row"><span>阴影深度</span><strong id="shadowValue">0.42</strong></span>
        <input id="shadowStrength" type="range" min="0" max="1" value="0.42" step="0.02" />
      </label>
    </section>
    <div class="status" id="status">加载模型中...</div>
    <script type="module" src="./preview-arctic.mjs?v=20260701-arctic-preview"></script>
  </body>
</html>
